# Woodpecker CI Pipeline for Scroller Front-End PoC
# Lightweight CI/CD with Podman support

when:
  event:
    - pull_request
    - push
    - manual

steps:
  # ============================================================================
  # Unit Tests
  # ============================================================================
  - name: test-unit
    image: node:20-alpine
    commands:
      - |
        mkdir -p ci-logs
        LOG="ci-logs/test-unit.txt"
        set +e
        sh -eu -c '
          cd scroller-front-end-poc
          npm ci
          npm run test:allure:unit
        ' >"$LOG" 2>&1
        STATUS=$?
        cat "$LOG"
        if [ $STATUS -eq 0 ]; then
          rm -f "$LOG"
        fi
        exit $STATUS
    when:
      event:
        - pull_request
        - push
        - manual

  # ============================================================================
  # E2E Tests
  # ============================================================================
  - name: test-e2e
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    environment:
      JWT_SECRET_KEY: f74ed097f9240073570d2534bb8e4184
      E2E_LOGIN_USERNAME: jack
      E2E_LOGIN_PASSWORD: password123
    commands:
      - |
        mkdir -p ci-logs
        LOG="ci-logs/test-e2e.txt"
        set +e
        sh -eu -c '
          cd scroller-front-end-poc
          npm ci
          npm run test:e2e:ci
        ' >"$LOG" 2>&1
        STATUS=$?
        cat "$LOG"
        if [ $STATUS -eq 0 ]; then
          rm -f "$LOG"
        fi
        exit $STATUS
    when:
      event:
        - pull_request
        - push
        - manual

  # ============================================================================
  # Build and Push Image to Local Registry (main branch only)
  # ============================================================================
  - name: build-and-push
    image: quay.io/podman/stable:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      CONTAINER_HOST: unix:///var/run/docker.sock
    depends_on:
      - test-unit
      - test-e2e
    when:
      event: push
      branch: main
      status: success
    commands:
      - |
        mkdir -p ci-logs
        LOG="ci-logs/build-and-push.txt"
        set +e
        sh -eu -c '
          echo "Building and publishing latest image..."
          if ! command -v make >/dev/null 2>&1; then
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache make
            elif command -v microdnf >/dev/null 2>&1; then
              microdnf install -y make
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y make
            else
              echo "No supported package manager found to install make"
              exit 1
            fi
          fi
          make podman-build
          make podman-push
        ' >"$LOG" 2>&1
        STATUS=$?
        cat "$LOG"
        if [ $STATUS -eq 0 ]; then
          rm -f "$LOG"
        fi
        exit $STATUS

  # ============================================================================
  # Deploy Latest Image to Host Machine (main branch only)
  # ============================================================================
  - name: deploy-main
    image: quay.io/podman/stable:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      CONTAINER_HOST: unix:///var/run/docker.sock
      PODMAN_HEALTHCHECK_URL: http://host.containers.internal:8410
    depends_on:
      - build-and-push
    when:
      event: push
      branch: main
      status: success
    commands:
      - |
        mkdir -p ci-logs
        LOG="ci-logs/deploy-main.txt"
        set +e
        sh -eu -c '
          echo "Deploying latest published image..."
          if ! command -v make >/dev/null 2>&1; then
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache make curl
            elif command -v microdnf >/dev/null 2>&1; then
              microdnf install -y make curl
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y make curl
            else
              echo "No supported package manager found to install make/curl"
              exit 1
            fi
          fi
          if ! command -v curl >/dev/null 2>&1; then
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache curl
            elif command -v microdnf >/dev/null 2>&1; then
              microdnf install -y curl
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y curl
            else
              echo "No supported package manager found to install curl"
              exit 1
            fi
          fi
          make podman-deploy-ci
        ' >"$LOG" 2>&1
        STATUS=$?
        cat "$LOG"
        if [ $STATUS -eq 0 ]; then
          rm -f "$LOG"
        fi
        exit $STATUS

  # ============================================================================
  # Post-deploy host login smoke check (main branch only)
  # ============================================================================
  - name: post-deploy-login-smoke
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    environment:
      E2E_LOGIN_USERNAME: jack
      E2E_LOGIN_PASSWORD: password123
    depends_on:
      - deploy-main
    when:
      event: push
      branch: main
      status: success
    commands:
      - |
        mkdir -p ci-logs
        LOG="ci-logs/post-deploy-login-smoke.txt"
        set +e
        sh -eu -c '
          cd scroller-front-end-poc
          npm ci
          npm run test:e2e:deploy-smoke
        ' >"$LOG" 2>&1
        STATUS=$?
        cat "$LOG"
        if [ $STATUS -eq 0 ]; then
          rm -f "$LOG"
        fi
        exit $STATUS

  # ============================================================================
  # Generate Allure Report (always run to preserve diagnostics)
  # ============================================================================
  - name: allure-report
    image: docker.io/frankescobar/allure-docker-service:2.27.0
    when:
      status: [ success, failure ]
    commands:
      - |
        mkdir -p ci-logs
        LOG="ci-logs/allure-report.txt"
        set +e
        sh -eu -c '
          echo "Generating Allure report from available test artifacts..."
          mkdir -p allure-results
          for RESULTS_DIR in scroller-front-end-poc/allure-results-unit scroller-front-end-poc/allure-results-e2e; do
            if [ -d "$RESULTS_DIR" ] && [ "$(ls -A "$RESULTS_DIR" 2>/dev/null)" ]; then
              echo "Found test results in $RESULTS_DIR"
              cp -r "$RESULTS_DIR"/. allure-results/ 2>/dev/null || true
            else
              echo "No test results found in $RESULTS_DIR"
            fi
          done
          find allure-results -type f -name executor.json | while read -r EXECUTOR_FILE; do
            if [ "$(tr -d "[:space:]" < "$EXECUTOR_FILE")" = "{}" ]; then
              echo "Removing empty executor metadata: $EXECUTOR_FILE"
              rm -f "$EXECUTOR_FILE"
            fi
          done
          if [ "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results --clean -o allure-report
            echo "Allure report generated at allure-report/index.html"
          else
            echo "No Allure result inputs found; skipping report generation"
          fi
        ' >"$LOG" 2>&1
        STATUS=$?
        cat "$LOG"
        if [ $STATUS -eq 0 ]; then
          rm -f "$LOG"
        fi
        exit $STATUS

  # ============================================================================
  # Store Report + Retained Failure Logs Locally
  # ============================================================================
  - name: store-report-locally
    image: alpine:latest
    when:
      status: [ success, failure ]
    commands:
      - |
        REPORT_DIR="/reports/${CI_REPO}/${CI_COMMIT_BRANCH}/${CI_COMMIT_SHA}"
        mkdir -p "$REPORT_DIR"

        if [ -d "allure-report" ] && [ "$(ls -A allure-report 2>/dev/null)" ]; then
          cp -r allure-report/. "$REPORT_DIR/"
          echo "Report stored at: $REPORT_DIR/index.html"
          LATEST_DIR="/reports/${CI_REPO}/${CI_COMMIT_BRANCH}/latest"
          rm -f "$LATEST_DIR"
          ln -sf "${CI_COMMIT_SHA}" "$LATEST_DIR"
          echo "Build report URL: http://localhost:8080/reports/${CI_REPO}/${CI_COMMIT_BRANCH}/${CI_COMMIT_SHA}/index.html"
          echo "Latest report URL: http://localhost:8080/reports/${CI_REPO}/${CI_COMMIT_BRANCH}/latest/index.html"
        else
          echo "No Allure report directory found; skipping report copy"
        fi

        if [ -d "ci-logs" ] && [ "$(ls -A ci-logs 2>/dev/null)" ]; then
          mkdir -p "$REPORT_DIR/ci-logs"
          cp -r ci-logs/. "$REPORT_DIR/ci-logs/" 2>/dev/null || true
          echo "CI logs URL: http://localhost:8080/reports/${CI_REPO}/${CI_COMMIT_BRANCH}/${CI_COMMIT_SHA}/ci-logs/"
        else
          echo "No retained CI logs found; skipping ci-logs copy"
        fi
