# Kubernetes manifest for Scroller Front-End PoC
# Deploy with: podman play kube podman-scroller-kube.yaml

apiVersion: v1
kind: Pod
metadata:
  name: pod_scroller_front_end
  labels:
    app: pod_scroller_front_end
spec:
  restartPolicy: Always
  containers:
    - name: scroller-front-end
      image: host.containers.internal:5000/scroller-front-end-poc:latest
      imagePullPolicy: Always
      ports:
        - containerPort: 3000
          hostPort: 3020
      readinessProbe:
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 10
        periodSeconds: 10
      livenessProbe:
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 20
        periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: scroller-front-end
spec:
  selector:
    app: pod_scroller_front_end
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: LoadBalancer
