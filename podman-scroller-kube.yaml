# Kubernetes manifest for Scroller Front-End PoC
# Deploy with: podman play kube podman-scroller-kube.yaml

apiVersion: v1
kind: Pod
metadata:
  name: pod_scroller_front_end
  labels:
    app: pod_scroller_front_end
spec:
  restartPolicy: Always
  containers:
    - name: scroller-front-end
      image: host.containers.internal:5000/scroller-front-end-poc:latest
      imagePullPolicy: Always
      env:
        - name: JWT_SECRET_KEY
          value: f74ed097f9240073570d2534bb8e4184
      ports:
        - containerPort: 8410
          hostPort: 8410
      readinessProbe:
        httpGet:
          path: /
          port: 8410
        initialDelaySeconds: 10
        periodSeconds: 10
      livenessProbe:
        httpGet:
          path: /
          port: 8410
        initialDelaySeconds: 20
        periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: scroller-front-end
spec:
  selector:
    app: pod_scroller_front_end
  ports:
    - name: http
      port: 8410
      targetPort: 8410
  type: LoadBalancer
